      type: object
      properties:
        promoted_properties:
          type: object
          additionalProperties:
            type: string
          description: Mapping from event name to the team-configured promoted property
            for that event. Names without a configured promoted property are omitted;
            callers should fall back to the core taxonomy defaults for those.
      required:
      - promoted_properties
    Property:
      type: object
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/PropertyGroupOperator'
          default: AND
          description: |2-

             You can use a simplified version:
            ```json
            {
                "properties": [
                    {
                        "key": "email",
                        "value": "x@y.com",
                        "operator": "exact",
                        "type": "event"
                    }
                ]
            }
            ```

            Or you can create more complicated queries with AND and OR:
            ```json
            {
                "properties": {
                    "type": "AND",
                    "values": [
                        {
                            "type": "OR",
                            "values": [
                                {"key": "email", ...},
                                {"key": "email", ...}
                            ]
                        },
                        {
                            "type": "AND",
                            "values": [
                                {"key": "email", ...},
                                {"key": "email", ...}
                            ]
                        }
                    ]
                ]
            }
            ```


            * `AND` - AND
            * `OR` - OR
        values:
          type: array
          items:
            $ref: '#/components/schemas/PropertyItem'
      required:
      - values
    PropertyDefinitionTypeEnum:
      enum:
      - DateTime
      - String
      - Numeric
      - Boolean
      - Duration
      type: string
      description: |-
        * `DateTime` - DateTime
        * `String` - String
        * `Numeric` - Numeric
        * `Boolean` - Boolean
        * `Duration` - Duration
