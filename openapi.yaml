  /api/environments/{project_id}/llm_analytics/summarization/:
    post:
      operationId: llm_analytics_summarization_create
      description: "\nGenerate an AI-powered summary of an LLM trace or event.\n\nThis
        endpoint analyzes the provided trace/event, generates a line-numbered text\nrepresentation,
        and uses an LLM to create a concise summary with line references.\n\n**Two
        ways to use this endpoint:**\n\n1. **By ID (recommended):** Pass `trace_id`
        or `generation_id` with an optional `date_from`/`date_to`.\n   The backend
        fetches the data automatically. `summarize_type` is inferred.\n2. **By data:**
        Pass the full trace/event data blob in `data` with `summarize_type`.\n   This
        is how the frontend uses it.\n\n**Summary Format:**\n- Title (concise, max
        10 words)\n- Mermaid flow diagram showing the main flow\n- 3-10 summary bullets
        with line references\n- \"Interesting Notes\" section for failures, successes,
        or unusual patterns\n- Line references in [L45] or [L45-52] format pointing
        to relevant sections\n\nThe response includes the structured summary, the
        text representation, and metadata.\n        "
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
        description: Project ID of the project you're trying to access. To find the
          ID of the project, make a call to /api/projects/.
      tags:
      - LLM Analytics
      - llm_analytics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
            examples:
              TraceSummarization:
                value:
                  summarize_type: trace
                  data:
                    trace:
                      id: trace_123
                      properties:
                        $ai_span_name: ChatBot Interaction
                    hierarchy:
                    - event:
                        id: gen_1
                        event: $ai_generation
                        properties:
                          $ai_input:
                          - role: user
                            content: Hello
                          $ai_output_choices:
                          - message:
                              role: assistant
                              content: Hi there!
                      children: []
                summary: Trace Summarization
                description: Summarize a full trace with hierarchy
              EventSummarization:
                value:
                  summarize_type: event
                  data:
                    event:
                      id: gen_456
                      event: $ai_generation
                      properties:
                        $ai_input:
                        - role: user
                          content: Explain Python
                        $ai_output_choices:
                        - message:
                            role: assistant
                            content: Python is...
                summary: Event Summarization
                description: Summarize a single generation event
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
      security:
      - PersonalAPIKeyAuth:
        - llm_analytics:write
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummarizeResponse'
              examples:
                SuccessResponse:
                  value:
                    summary: |-
                      ## Summary
                      - User initiated conversation with greeting [L5-8]
                      - Assistant responded with friendly message [L12-15]

                      ## Interesting Notes
                      - Standard greeting pattern with no errors
                    metadata:
                      text_repr_length: 450
                      model: gpt-4.1
                  summary: Success Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
      x-explicit-tags:
      - LLM Analytics
      - llm_analytics
