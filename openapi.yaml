    DatePropertyFilter:
      type: object
      description: Matches date/datetime values with date-specific operators.
      properties:
        key:
          type: string
          description: Key of the property you're filtering on. For example `email`
            or `$current_url`.
        type:
          allOf:
          - $ref: '#/components/schemas/PropertyFilterTypeEnum'
          default: event
          description: |-
            Property type (event, person, session, etc.).

            * `event` - event
            * `event_metadata` - event_metadata
            * `feature` - feature
            * `person` - person
            * `cohort` - cohort
            * `element` - element
            * `static-cohort` - static-cohort
            * `dynamic-cohort` - dynamic-cohort
            * `precalculated-cohort` - precalculated-cohort
            * `group` - group
            * `recording` - recording
            * `log_entry` - log_entry
            * `behavioral` - behavioral
            * `session` - session
            * `hogql` - hogql
            * `data_warehouse` - data_warehouse
            * `data_warehouse_person_property` - data_warehouse_person_property
            * `error_tracking_issue` - error_tracking_issue
            * `log` - log
            * `log_attribute` - log_attribute
            * `log_resource_attribute` - log_resource_attribute
            * `span` - span
            * `span_attribute` - span_attribute
            * `span_resource_attribute` - span_resource_attribute
            * `revenue_analytics` - revenue_analytics
            * `flag` - flag
            * `workflow_variable` - workflow_variable
        value:
          type: string
          description: Date or datetime string in ISO 8601 format (e.g. '2024-01-15'
            or '2024-01-15T10:30:00Z').
        operator:
          allOf:
          - $ref: '#/components/schemas/DateOperatorEnum'
          default: is_date_exact
          description: |-
            Date comparison operator.

            * `is_date_exact` - is_date_exact
            * `is_date_before` - is_date_before
            * `is_date_after` - is_date_after
      required:
      - key
      - value
    DateRange:
      additionalProperties: false
      properties:
        date_from:
          default: null
          description: |-
            Start of the date range. Accepts ISO 8601 timestamps (e.g., 2024-01-15T00:00:00Z) or relative formats: -7d (7 days ago), -2w (2 weeks ago), -1m (1 month ago),
            -1h (1 hour ago), -1mStart (start of last month), -1yStart (start of last year).
          title: Date From
          type: string
          nullable: true
        date_to:
          default: null
          description: End of the date range. Same format as date_from. Omit or null
            for "now".
          title: Date To
          type: string
          nullable: true
        explicitDate:
          default: false
          description: Whether the date_from and date_to should be used verbatim.
            Disables rounding to the start and end of period.
          title: Explicitdate
          type: boolean
          nullable: true
