  /api/projects/{project_id}/conversations/tickets/:
    get:
      operationId: conversations_tickets_list
      description: List tickets with person data attached.
      parameters:
      - in: query
        name: assignee
        schema:
          type: string
        description: Filter by assignee. Use `unassigned` for tickets with no assignee,
          `user:<user_id>` for a specific user, or `role:<role_uuid>` for a role.
      - in: query
        name: channel_detail
        schema:
          type: string
          enum:
          - slack_bot_mention
          - slack_channel_message
          - slack_emoji_reaction
          - teams_bot_mention
          - teams_channel_message
          - widget_api
          - widget_embedded
        description: Filter by the channel sub-type (e.g. `widget_embedded`, `slack_bot_mention`).
      - in: query
        name: channel_source
        schema:
          type: string
          enum:
          - email
          - slack
          - teams
          - widget
        description: Filter by the channel the ticket originated from.
      - in: query
        name: date_from
        schema:
          type: string
        description: Only include tickets updated on or after this date. Accepts absolute
          dates (`2026-01-01`) or relative ones (`-7d`, `-1mStart`). Pass `all` to
          disable the filter.
      - in: query
        name: date_to
        schema:
          type: string
        description: Only include tickets updated on or before this date. Same format
          as `date_from`.
      - in: query
        name: distinct_ids
        schema:
          type: string
        description: Comma-separated list of person `distinct_id`s to filter by (max
          100).
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: order_by
        schema:
          type: string
          enum:
          - -created_at
          - -sla_due_at
          - -ticket_number
          - -updated_at
          - created_at
          - sla_due_at
          - ticket_number
          - updated_at
        description: Sort order. Prefix with `-` for descending. Defaults to `-updated_at`.
      - in: query
        name: priority
        schema:
          type: string
        description: 'Filter by priority. Accepts a single value or a comma-separated
          list (e.g. `medium,high`). Valid values: `low`, `medium`, `high`.'
      - in: path
        name: project_id
        required: true
        schema:
          type: string
        description: Project ID of the project you're trying to access. To find the
          ID of the project, make a call to /api/projects/.
      - in: query
        name: search
        schema:
          type: string
        description: Free-text search. A numeric value matches a ticket number exactly;
          otherwise matches against the customer's name or email (case-insensitive,
          partial match).
      - in: query
        name: sla
        schema:
          type: string
          enum:
          - at-risk
          - breached
          - on-track
        description: Filter by SLA state. `breached` = past `sla_due_at`, `at-risk`
          = due within the next hour, `on-track` = more than an hour remaining.
      - in: query
        name: status
        schema:
          type: string
        description: 'Filter by status. Accepts a single value or a comma-separated
          list (e.g. `new,open,pending`). Valid values: `new`, `open`, `pending`,
          `on_hold`, `resolved`.'
      - in: query
        name: tags
        schema:
          type: string
        description: JSON-encoded array of tag names to filter by, e.g. `["billing","urgent"]`.
      tags:
      - conversations
      security:
      - PersonalAPIKeyAuth:
        - ticket:read
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTicketList'
          description: ''
