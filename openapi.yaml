          - queued
          - in_progress
          - completed
          - failed
          - cancelled
          type: string
          minLength: 1
        description: |-
          Filter tasks by the status of their most recent run.

          * `not_started` - not_started
          * `queued` - queued
          * `in_progress` - in_progress
          * `completed` - completed
          * `failed` - failed
          * `cancelled` - cancelled
