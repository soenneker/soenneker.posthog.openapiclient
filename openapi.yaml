            A choice of supported BatchExportDestination types.

            * `S3` - S3
            * `Snowflake` - Snowflake
            * `Postgres` - Postgres
            * `Redshift` - Redshift
            * `BigQuery` - Bigquery
            * `Databricks` - Databricks
            * `AzureBlob` - Azure Blob
            * `Workflows` - Workflows
            * `HTTP` - Http
            * `NoOp` - Noop
        config:
          description: A JSON field to store all configuration parameters required
            to access a BatchExportDestination.
        integration:
          type: integer
          nullable: true
        integration_id:
          type: integer
          writeOnly: true
          nullable: true
      required:
