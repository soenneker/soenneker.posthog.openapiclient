      - threshold_change
      type: string
      description: |-
        * `check` - Check
        * `reset` - Reset
        * `enable` - Enable
        * `disable` - Disable
        * `snooze` - Snooze
        * `unsnooze` - Unsnooze
        * `threshold_change` - Threshold change
    LogsAlertSimulateBucket:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Bucket start timestamp.
        count:
          type: integer
          description: Number of matching logs in this bucket.
        threshold_breached:
          type: boolean
          description: Whether the count crossed the threshold in this bucket.
        state:
          type: string
          description: Alert state after evaluating this bucket.
        notification:
          type: string
          description: 'Notification action: none, fire, or resolve.'
        reason:
          type: string
          description: Human-readable explanation of the state transition.
      required:
      - count
      - notification
      - reason
      - state
      - threshold_breached
      - timestamp
    LogsAlertSimulateRequest:
      type: object
      properties:
        filters:
          description: Filter criteria — same format as LogsAlertConfiguration.filters.
        threshold_count:
          type: integer
          minimum: 1
          description: Threshold count to evaluate against.
        threshold_operator:
          allOf:
          - $ref: '#/components/schemas/ThresholdOperatorEnum'
          description: |-
            Whether the alert fires when the count is above or below the threshold.

            * `above` - Above
            * `below` - Below
        window_minutes:
          type: integer
          description: Window size in minutes — determines bucket interval.
        evaluation_periods:
          type: integer
          maximum: 10
          minimum: 1
          default: 1
          description: Total check periods in the N-of-M evaluation window (M).
        datapoints_to_alarm:
          type: integer
          maximum: 10
          minimum: 1
          default: 1
          description: How many periods must breach to fire (N in N-of-M).
        cooldown_minutes:
          type: integer
          minimum: 0
          default: 0
          description: Minutes to wait after firing before sending another notification.
        date_from:
          type: string
          description: Relative date string for how far back to simulate (e.g. '-24h',
            '-7d', '-30d').
      required:
      - date_from
      - filters
      - threshold_count
      - threshold_operator
      - window_minutes
    LogsAlertSimulateResponse:
      type: object
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/LogsAlertSimulateBucket'
          description: Time-bucketed counts with full state machine evaluation.
        fire_count:
          type: integer
          description: Number of times the alert would have sent a fire notification.
        resolve_count:
          type: integer
          description: Number of times the alert would have sent a resolve notification.
        total_buckets:
          type: integer
          description: Total number of buckets in the simulation window.
        threshold_count:
          type: integer
          description: Threshold count used for evaluation.
        threshold_operator:
          type: string
          description: Threshold operator used for evaluation.
      required:
      - buckets
      - fire_count
      - resolve_count
      - threshold_count
      - threshold_operator
      - total_buckets
    LogsAlertStateInterval:
      type: object
      properties:
        start:
          type: string
          format: date-time
          description: Interval start (UTC, inclusive).
        end:
          type: string
          format: date-time
          description: Interval end (UTC, exclusive).
        state:
          allOf:
          - $ref: '#/components/schemas/LogsAlertConfigurationStateEnum'
          description: |-
            Alert state during this interval.

            * `not_firing` - Not firing
            * `firing` - Firing
            * `pending_resolve` - Pending resolve
            * `errored` - Errored
            * `snoozed` - Snoozed
            * `broken` - Broken
        enabled:
          type: boolean
          description: Whether the alert was enabled during this interval. Disabled
            alerts keep their state but are inactive.
      required:
      - enabled
      - end
      - start
      - state
