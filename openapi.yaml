components:
  schemas:
    AIEventType:
      enum:
      - $ai_generation
      - $ai_embedding
      - $ai_span
      - $ai_trace
      - $ai_metric
      - $ai_feedback
      - $ai_evaluation
      - $ai_trace_summary
      - $ai_generation_summary
      - $ai_trace_clusters
      - $ai_generation_clusters
      title: AIEventType
      type: string
    AccessMethodEnum:
      enum:
      - warehouse
      - direct
      type: string
      description: |-
        * `warehouse` - warehouse
        * `direct` - direct
    Action:
      type: object
      description: Serializer mixin that handles tags for objects.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          nullable: true
          description: Name of the action (must be unique within the project).
          maxLength: 400
        description:
          type: string
          description: Human-readable description of what this action represents.
        tags:
          type: array
          items: {}
        post_to_slack:
          type: boolean
          description: Whether to post a notification to Slack when this action is
            triggered.
        slack_message_format:
          type: string
          description: Custom Slack message format. Supports templates with event
            properties.
          maxLength: 1200
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ActionStepJSON'
          description: Action steps defining trigger conditions. Each step matches
            events by name, properties, URL, or element attributes. Multiple steps
            are OR-ed together.
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          allOf:
          - $ref: '#/components/schemas/UserBasic'
          readOnly: true
        deleted:
          type: boolean
        is_calculating:
          type: boolean
          readOnly: true
        last_calculated_at:
          type: string
          format: date-time
