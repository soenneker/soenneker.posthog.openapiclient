          type: string
          format: uuid
          description: Optional sandbox environment to apply for this cloud run.
        pr_authorship_mode:
          allOf:
          - $ref: '#/components/schemas/PrAuthorshipModeEnum'
          description: |-
            Whether pull requests for this run should be authored by the user or the bot.

            * `user` - user
            * `bot` - bot
        run_source:
          allOf:
          - $ref: '#/components/schemas/RunSourceEnum'
          description: |-
            High-level source that triggered this run, used to distinguish manual and signal-based cloud runs.

            * `manual` - manual
            * `signal_report` - signal_report
        signal_report_id:
          type: string
          description: Optional signal report identifier when this run was started
            from Inbox.
        runtime_adapter:
          allOf:
          - $ref: '#/components/schemas/RuntimeAdapterEnum'
          description: |-
            Agent runtime adapter to launch for this run. Use 'claude' for the Claude runtime or 'codex' for the Codex runtime.

            * `claude` - claude
            * `codex` - codex
        model:
          type: string
          description: LLM model identifier to run in the selected runtime.
        reasoning_effort:
          allOf:
          - $ref: '#/components/schemas/ReasoningEffortEnum'
          description: |-
            Reasoning effort to request for models that expose an effort control.

            * `low` - low
            * `medium` - medium
            * `high` - high
            * `xhigh` - xhigh
            * `max` - max
        github_user_token:
          type: string
          writeOnly: true
          description: Ephemeral GitHub user token from PostHog Code for user-authored
            cloud pull requests.
        initial_permission_mode:
          allOf:
          - $ref: '#/components/schemas/TaskRunBootstrapCreateRequestInitialPermissionModeEnum'
          description: |-
            Initial permission mode for the agent session. Claude runtimes accept PostHog permission presets like 'plan'. Codex runtimes accept native Codex modes like 'auto' and 'read-only'.

            * `default` - default
            * `acceptEdits` - acceptEdits
            * `plan` - plan
            * `bypassPermissions` - bypassPermissions
            * `auto` - auto
            * `read-only` - read-only
            * `full-access` - full-access
