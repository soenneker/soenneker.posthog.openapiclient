openapi: 3.0.3
info:
  title: PostHog API
  version: 1.0.0
  description: ''
paths:
  /api/code/invites/check-access/:
    get:
      operationId: code_invites_check_access_retrieve
      description: Check whether the authenticated user has access to PostHog Code.
      summary: Check access
      tags:
      - code-invites
      - code
      responses:
        '200':
          description: Access check result
      x-explicit-tags:
      - code-invites
      - tasks
  /api/code/invites/redeem/:
    post:
      operationId: code_invites_redeem_create
      description: Redeem a PostHog Code invite code to enable access.
      summary: Redeem invite code
      tags:
      - code-invites
      - code
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeInviteRedeemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CodeInviteRedeemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CodeInviteRedeemRequest'
        required: true
      responses:
        '200':
          description: Invite code redeemed successfully
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid or expired invite code
      x-explicit-tags:
      - code-invites
      - tasks
  /api/environments/{environment_id}/alerts/:
    get:
      operationId: environments_alerts_list
      parameters:
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - alerts
      security:
      - PersonalAPIKeyAuth:
        - alert:read
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlertList'
          description: ''
      deprecated: true
      x-explicit-tags: []
    post:
      operationId: environments_alerts_create
      parameters:
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      tags:
      - alerts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alert'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Alert'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Alert'
        required: true
      security:
      - PersonalAPIKeyAuth:
        - alert:write
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
      deprecated: true
      x-explicit-tags: []
  /api/environments/{environment_id}/alerts/{id}/:
    get:
      operationId: environments_alerts_retrieve
      parameters:
      - in: query
        name: checks_date_from
        schema:
          type: string
        description: Relative date string for the start of the check history window
          (e.g. '-24h', '-7d', '-14d'). Returns checks created after this time. Max
          retention is 14 days.
      - in: query
        name: checks_date_to
        schema:
          type: string
        description: Relative date string for the end of the check history window
          (e.g. '-1h', '-1d'). Defaults to now if not specified.
      - in: query
        name: checks_limit
        schema:
          type: integer
        description: Maximum number of check results to return (default 5, max 500).
          Applied after date filtering.
      - in: query
        name: checks_offset
        schema:
          type: integer
        description: Number of newest checks to skip (0-based). Use with checks_limit
          for pagination. Default 0.
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this alert configuration.
        required: true
      tags:
      - alerts
      security:
      - PersonalAPIKeyAuth:
        - alert:read
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
      deprecated: true
      x-explicit-tags: []
    put:
      operationId: environments_alerts_update
      parameters:
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this alert configuration.
        required: true
      tags:
      - alerts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alert'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Alert'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Alert'
        required: true
      security:
      - PersonalAPIKeyAuth:
        - alert:write
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
      deprecated: true
      x-explicit-tags: []
    patch:
      operationId: environments_alerts_partial_update
      parameters:
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this alert configuration.
        required: true
      tags:
      - alerts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAlert'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAlert'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAlert'
      security:
      - PersonalAPIKeyAuth:
        - alert:write
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
      deprecated: true
      x-explicit-tags: []
    delete:
      operationId: environments_alerts_destroy
      parameters:
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this alert configuration.
        required: true
      tags:
      - alerts
      security:
      - PersonalAPIKeyAuth:
        - alert:write
      responses:
        '204':
          description: No response body
      deprecated: true
      x-explicit-tags: []
  /api/environments/{environment_id}/alerts/simulate/:
    post:
      operationId: environments_alerts_simulate_create
