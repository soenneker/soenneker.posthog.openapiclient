    BatchCheckRequest:
      type: object
      properties:
        trace_ids:
          type: array
          items:
            type: string
          description: List of trace IDs to check for cached summaries
          maxItems: 100
        mode:
          allOf:
          - $ref: '#/components/schemas/DetailModeValueEnum'
          default: minimal
          description: |-
            Summary detail level to check for

            * `minimal` - minimal
            * `detailed` - detailed
        model:
          type: string
          nullable: true
          description: LLM model used for cached summaries
      required:
      - trace_ids
    BatchCheckResponse:
      type: object
      properties:
        summaries:
          type: array
          items:
            $ref: '#/components/schemas/CachedSummary'
      required:
      - summaries
    BatchExport:
      type: object
      description: Serializer for a BatchExport model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        team_id:
          type: integer
          description: The team this belongs to.
          readOnly: true
        name:
          type: string
          description: A human-readable name for this BatchExport.
        model:
          nullable: true
          description: |-
            Which model this BatchExport is exporting.

            * `events` - Events
            * `persons` - Persons
            * `sessions` - Sessions
          oneOf:
          - $ref: '#/components/schemas/ModelEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        destination:
          $ref: '#/components/schemas/BatchExportDestination'
        interval:
          $ref: '#/components/schemas/IntervalEnum'
        paused:
          type: boolean
          description: Whether this BatchExport is paused or not.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: The timestamp at which this BatchExport was created.
        last_updated_at:
          type: string
          format: date-time
          readOnly: true
          description: The timestamp at which this BatchExport was last updated.
        last_paused_at:
          type: string
          format: date-time
          nullable: true
          description: The timestamp at which this BatchExport was last paused.
        start_at:
          type: string
          format: date-time
          nullable: true
          description: Time before which any Batch Export runs won't be triggered.
        end_at:
          type: string
          format: date-time
          nullable: true
          description: Time after which any Batch Export runs won't be triggered.
        latest_runs:
          type: array
          items:
            $ref: '#/components/schemas/BatchExportRun'
          readOnly: true
        hogql_query:
          type: string
        schema:
          readOnly: true
          nullable: true
          description: A schema of custom fields to select when exporting data.
        filters:
          nullable: true
        timezone:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TimezoneEnum'
          - $ref: '#/components/schemas/NullEnum'
        offset_day:
          type: integer
          maximum: 6
          minimum: 0
          nullable: true
        offset_hour:
          type: integer
          maximum: 23
          minimum: 0
          nullable: true
      required:
      - created_at
      - destination
      - id
      - interval
      - last_updated_at
      - latest_runs
      - name
      - schema
      - team_id
    BatchExportBackfill:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        progress:
          type: object
          nullable: true
          properties:
            total_runs:
              type: integer
              nullable: true
            finished_runs:
              type: integer
              nullable: true
            progress:
              type: number
              nullable: true
          readOnly: true
        start_at:
          type: string
          format: date-time
          nullable: true
          description: The start of the data interval.
        end_at:
          type: string
          format: date-time
          nullable: true
          description: The end of the data interval.
        status:
          allOf:
          - $ref: '#/components/schemas/BatchExportBackfillStatusEnum'
          description: |-
            The status of this backfill.

            * `Cancelled` - Cancelled
            * `Completed` - Completed
            * `ContinuedAsNew` - Continued As New
            * `Failed` - Failed
            * `FailedRetryable` - Failed Retryable
            * `Terminated` - Terminated
            * `TimedOut` - Timedout
            * `Running` - Running
            * `Starting` - Starting
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: The timestamp at which this BatchExportBackfill was created.
        finished_at:
          type: string
          format: date-time
          nullable: true
          description: The timestamp at which this BatchExportBackfill finished, successfully
            or not.
        last_updated_at:
          type: string
          format: date-time
          readOnly: true
          description: The timestamp at which this BatchExportBackfill was last updated.
        total_records_count:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
          description: The total number of records to export. Initially estimated,
            updated with actual count after completion.
        adjusted_start_at:
          type: string
          format: date-time
          nullable: true
          description: The actual start time after adjustment for earliest available
            data. May differ from start_at if user requested a date before data exists.
        team:
          type: integer
          description: The team this belongs to.
        batch_export:
          type: string
          format: uuid
          description: The BatchExport this backfill belongs to.
      required:
      - batch_export
      - created_at
      - id
      - last_updated_at
      - progress
      - status
      - team
    BatchExportBackfillStatusEnum:
      enum:
      - Cancelled
      - Completed
      - ContinuedAsNew
      - Failed
      - FailedRetryable
      - Terminated
      - TimedOut
      - Running
      - Starting
      type: string
      description: |-
        * `Cancelled` - Cancelled
        * `Completed` - Completed
        * `ContinuedAsNew` - Continued As New
        * `Failed` - Failed
        * `FailedRetryable` - Failed Retryable
        * `Terminated` - Terminated
        * `TimedOut` - Timedout
        * `Running` - Running
        * `Starting` - Starting
    BatchExportDestination:
