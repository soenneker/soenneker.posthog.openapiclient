    get:
      operationId: environments_insights_list
      description: |-
        DRF ViewSet mixin that gates coalesced responses behind permission checks.

        The QueryCoalescingMiddleware attaches cached response data to
        request.META["_coalesced_response"] for followers. This mixin runs DRF's
        initial() (auth + permissions + throttling) before returning the
        cached response, ensuring the request is authorized.
      parameters:
      - in: query
        name: basic
        schema:
          type: boolean
        description: Return basic insight metadata only (no results, faster).
      - in: query
        name: created_by
        schema:
          type: string
        description: JSON-encoded array of user IDs. Only returns insights whose `created_by`
          is in the list, e.g. `[1,42]`.
      - in: query
        name: created_date_from
        schema:
          type: string
        description: Filter by `created_at > created_date_from`. Accepts absolute
          or relative dates.
      - in: query
        name: created_date_to
        schema:
          type: string
        description: Filter by `created_at < created_date_to`. Accepts absolute or
          relative dates.
      - in: query
        name: dashboards
        schema:
          type: string
        description: JSON-encoded array of dashboard IDs. Returns insights attached
          to every listed dashboard (AND).
      - in: query
        name: date_from
        schema:
          type: string
        description: Filter by `last_modified_at > date_from`. Accepts absolute dates
          (`2025-04-23`) or relative strings (`-7d`, `-1m`).
      - in: query
        name: date_to
        schema:
          type: string
        description: Filter by `last_modified_at < date_to`. Accepts absolute dates
          or relative strings.
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      - in: query
        name: favorited
        schema:
          type: boolean
        description: Include this parameter (any value) to restrict results to insights
          marked as favorited.
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: query
        name: insight
        schema:
          type: string
          enum:
          - FUNNELS
          - JSON
          - LIFECYCLE
          - PATHS
          - RETENTION
          - SQL
          - STICKINESS
