          description: Threshold bounds and type. Includes bounds (lower/upper floats)
            and type (absolute or percentage).
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
          readOnly: true
      required:
      - alerts
      - configuration
      - created_at
      - id
    Ticket:
      type: object
      description: Serializer mixin that handles tags for objects.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        ticket_number:
          type: integer
          readOnly: true
        channel_source:
          allOf:
          - $ref: '#/components/schemas/ChannelSourceEnum'
          readOnly: true
        channel_detail:
          readOnly: true
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/ChannelDetailEnum'
          - $ref: '#/components/schemas/NullEnum'
        distinct_id:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/TicketStatusEnum'
          description: |-
            Ticket status: new, open, pending, on_hold, or resolved

            * `new` - New
            * `open` - Open
            * `pending` - Pending
            * `on_hold` - On hold
            * `resolved` - Resolved
        priority:
          nullable: true
          description: |-
            Ticket priority: low, medium, or high. Null if unset.

            * `low` - Low
            * `medium` - Medium
            * `high` - High
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        assignee:
          allOf:
          - $ref: '#/components/schemas/TicketAssignment'
          readOnly: true
        anonymous_traits:
          description: Customer-provided traits such as name and email
        ai_resolved:
          type: boolean
        escalation_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        message_count:
          type: integer
          readOnly: true
        last_message_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        last_message_text:
          type: string
          readOnly: true
          nullable: true
        unread_team_count:
          type: integer
          readOnly: true
        unread_customer_count:
          type: integer
          readOnly: true
        session_id:
          type: string
          readOnly: true
          nullable: true
        session_context:
          readOnly: true
        sla_due_at:
          type: string
          format: date-time
          nullable: true
          description: SLA deadline set via workflows. Null means no SLA.
        snoozed_until:
          type: string
          format: date-time
          nullable: true
        slack_channel_id:
          type: string
          readOnly: true
          nullable: true
        slack_thread_ts:
          type: string
          readOnly: true
          nullable: true
        slack_team_id:
          type: string
          readOnly: true
          nullable: true
        email_subject:
          type: string
          readOnly: true
          nullable: true
        email_from:
          type: string
          format: email
          readOnly: true
          nullable: true
        email_to:
          type: string
          nullable: true
          readOnly: true
        cc_participants:
          readOnly: true
        person:
          allOf:
          - $ref: '#/components/schemas/TicketPerson'
          readOnly: true
          nullable: true
        tags:
          type: array
          items: {}
      required:
      - assignee
      - cc_participants
      - channel_detail
      - channel_source
      - created_at
      - distinct_id
      - email_from
      - email_subject
      - email_to
      - id
      - last_message_at
      - last_message_text
      - message_count
      - person
      - session_context
      - session_id
      - slack_channel_id
      - slack_team_id
      - slack_thread_ts
      - ticket_number
      - unread_customer_count
      - unread_team_count
      - updated_at
    TicketAssignment:
      type: object
      description: Serializer for ticket assignment (user or role).
      properties:
        id:
          type: string
          nullable: true
          readOnly: true
        type:
          type: string
          readOnly: true
        user:
          type: object
          additionalProperties:
            type: string
          nullable: true
          readOnly: true
        role:
          type: object
          additionalProperties:
            type: string
          nullable: true
          readOnly: true
      required:
      - id
      - role
      - type
      - user
    TicketPerson:
      type: object
      description: Minimal person serializer for embedding in ticket responses.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        distinct_ids:
          type: array
          items:
            type: string
          readOnly: true
        properties:
          type: object
          additionalProperties: {}
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_identified:
          type: boolean
          readOnly: true
      required:
      - created_at
      - distinct_ids
      - id
      - is_identified
      - name
      - properties
    TicketStatusEnum:
      enum:
      - new
      - open
      - pending
      - on_hold
      - resolved
      type: string
      description: |-
        * `new` - New
        * `open` - Open
        * `pending` - Pending
        * `on_hold` - On hold
        * `resolved` - Resolved
    TicketView:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        short_id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 400
        filters:
          type: object
          additionalProperties: {}
          description: Saved ticket filter criteria. May contain status, priority,
            channel, sla, assignee, tags, dateFrom, dateTo, and sorting keys.
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          allOf:
          - $ref: '#/components/schemas/UserBasic'
          readOnly: true
      required:
      - created_at
      - created_by
      - id
      - name
      - short_id
    TimeWindowMode:
      enum:
      - strict_calendar_dates
      - 24_hour_windows
      title: TimeWindowMode
      type: string
    TimelineEntry:
      additionalProperties: false
      properties:
        events:
          items:
            $ref: '#/components/schemas/EventType'
          title: Events
          type: array
        recording_duration_s:
          default: null
          description: Duration of the recording in seconds.
          title: Recording Duration S
          type: number
          nullable: true
        sessionId:
          default: null
          description: Session ID. None means out-of-session events
          title: Sessionid
          type: string
          nullable: true
      required:
      - events
      title: TimelineEntry
      type: object
