          readOnly: true
        deleted:
          type: boolean
        is_calculating:
          type: boolean
          readOnly: true
        last_calculated_at:
          type: string
          format: date-time
        team_id:
          type: integer
          readOnly: true
        is_action:
          type: boolean
          readOnly: true
          default: true
        bytecode_error:
          type: string
          readOnly: true
          nullable: true
        pinned_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when the action was pinned, or null if not
