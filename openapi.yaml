    PinnedSceneTab:
      type: object
      properties:
        id:
          type: string
          description: Stable identifier for the tab. Generated client-side; safe
            to omit on create.
        pathname:
          type: string
          description: URL pathname the tab points at — for example `/project/123/dashboard/45`
            or `/project/123/insights`. Combined with `search` and `hash` to reconstruct
            the destination.
        search:
          type: string
          description: Query string portion of the URL, including the leading `?`.
            Empty string when there is no query.
        hash:
          type: string
          description: Fragment portion of the URL, including the leading `#`. Empty
            string when there is no fragment.
        title:
          type: string
          description: Default tab title derived from the destination scene. Used
            when `customTitle` is not set.
        customTitle:
          type: string
          nullable: true
          description: Optional user-provided title that overrides `title` in the
            navigation UI.
        iconType:
          type: string
          description: Icon key shown next to the tab in the sidebar — for example
            `dashboard`, `insight`, `blank`.
        sceneId:
          type: string
          nullable: true
          description: Scene identifier resolved from the pathname when known — used
            by the frontend for icon/title hints.
        sceneKey:
          type: string
          nullable: true
          description: Scene key (logic key) for the destination, paired with `sceneParams`
            for deeper routing context.
        sceneParams:
          description: Free-form scene parameters captured at pin time, used by the
            frontend to rehydrate the destination.
        pinned:
          type: boolean
          description: Whether this entry is pinned. Always coerced to true on save
            — pass true or omit.
    PinnedSceneTabs:
      type: object
      properties:
        tabs:
          type: array
          items:
            $ref: '#/components/schemas/PinnedSceneTab'
          description: Ordered list of pinned navigation tabs shown in the sidebar
            for the authenticated user within the current team. Send the full list
            to replace the existing pins; omit to leave them unchanged.
        homepage:
          allOf:
          - $ref: '#/components/schemas/PinnedSceneTab'
          nullable: true
          description: Tab descriptor for the user's chosen home page — the destination
            opened when they click the PostHog logo or hit `/`. Set to a tab descriptor
            to pick a homepage, send `null` or `{}` to clear it and fall back to the
            project default.
