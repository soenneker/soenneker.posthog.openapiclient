  /api/projects/{project_id}/insights/:
    get:
      operationId: insights_list
      description: |-
        DRF ViewSet mixin that gates coalesced responses behind permission checks.

        The QueryCoalescingMiddleware attaches cached response data to
        request.META["_coalesced_response"] for followers. This mixin runs DRF's
        initial() (auth + permissions + throttling) before returning the
        cached response, ensuring the request is authorized.
      parameters:
      - in: query
        name: basic
        schema:
          type: boolean
        description: Return basic insight metadata only (no results, faster).
      - in: query
        name: created_by
        schema:
          type: string
        description: JSON-encoded array of user IDs. Only returns insights whose `created_by`
          is in the list, e.g. `[1,42]`.
      - in: query
        name: created_date_from
        schema:
          type: string
        description: Filter by `created_at > created_date_from`. Accepts absolute
          or relative dates.
      - in: query
        name: created_date_to
        schema:
          type: string
        description: Filter by `created_at < created_date_to`. Accepts absolute or
          relative dates.
      - in: query
        name: dashboards
        schema:
          type: string
        description: JSON-encoded array of dashboard IDs. Returns insights attached
          to every listed dashboard (AND).
      - in: query
        name: date_from
        schema:
          type: string
        description: Filter by `last_modified_at > date_from`. Accepts absolute dates
          (`2025-04-23`) or relative strings (`-7d`, `-1m`).
      - in: query
        name: date_to
        schema:
          type: string
        description: Filter by `last_modified_at < date_to`. Accepts absolute dates
          or relative strings.
      - in: query
        name: favorited
        schema:
          type: boolean
        description: Include this parameter (any value) to restrict results to insights
          marked as favorited.
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: query
        name: insight
        schema:
          type: string
          enum:
          - FUNNELS
          - JSON
          - LIFECYCLE
          - PATHS
          - RETENTION
          - SQL
          - STICKINESS
          - TRENDS
        description: Restrict to a single insight type. `JSON` matches non-wrapper
          query insights; `SQL` matches HogQL queries.
      - in: query
        name: last_viewed_date_from
        schema:
          type: string
        description: Filter by `last_viewed_at > last_viewed_date_from`. Accepts absolute
          or relative dates.
      - in: query
        name: last_viewed_date_to
        schema:
          type: string
        description: Filter by `last_viewed_at < last_viewed_date_to`. Accepts absolute
          or relative dates.
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: project_id
        required: true
        schema:
          type: string
        description: Project ID of the project you're trying to access. To find the
          ID of the project, make a call to /api/projects/.
      - in: query
        name: refresh
        schema:
          type: string
          enum:
          - async
          - async_except_on_cache_miss
          - blocking
          - force_async
          - force_blocking
          - force_cache
          - lazy_async
          default: force_cache
        description: |2-

          Whether to refresh the retrieved insights, how aggressively, and if sync or async:
          - `'force_cache'` - return cached data or a cache miss; always completes immediately as it never calculates
          - `'blocking'` - calculate synchronously (returning only when the query is done), UNLESS there are very fresh results in the cache
          - `'async'` - kick off background calculation (returning immediately with a query status), UNLESS there are very fresh results in the cache
          - `'lazy_async'` - kick off background calculation, UNLESS there are somewhat fresh results in the cache
          - `'force_blocking'` - calculate synchronously, even if fresh results are already cached
          - `'force_async'` - kick off background calculation, even if fresh results are already cached
          Background calculation can be tracked using the `query_status` response field.
      - in: query
        name: saved
        schema:
          type: boolean
        description: When truthy, restricts results to insights that are saved (or
          attached to a visible dashboard). When falsy, only unsaved insights.
      - in: query
        name: search
        schema:
          type: string
        description: Case-insensitive substring match across name, derived_name, description,
          and tag names.
      - in: query
        name: short_id
        schema:
          type: string
      - in: query
        name: tags
        schema:
          type: string
        description: JSON-encoded array of tag names. Returns insights with any of
          the listed tags.
      - in: query
        name: user
        schema:
          type: boolean
        description: Include this parameter (any value) to restrict results to insights
          created by the authenticated user.
      tags:
      - product_analytics
      - insights
      security:
      - PersonalAPIKeyAuth:
        - insight:read
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInsightList'
            text/csv:
              schema:
                $ref: '#/components/schemas/PaginatedInsightList'
          description: ''
      x-explicit-tags:
      - product_analytics
    post:
      operationId: insights_create
      description: |-
        DRF ViewSet mixin that gates coalesced responses behind permission checks.

        The QueryCoalescingMiddleware attaches cached response data to
        request.META["_coalesced_response"] for followers. This mixin runs DRF's
        initial() (auth + permissions + throttling) before returning the
        cached response, ensuring the request is authorized.
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: path
        name: project_id
        required: true
        schema:
          type: string
        description: Project ID of the project you're trying to access. To find the
          ID of the project, make a call to /api/projects/.
      tags:
      - product_analytics
      - insights
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Insight'
      security:
      - PersonalAPIKeyAuth:
        - insight:write
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Insight'
