          type: array
          items:
            type: string
          description: Filter by service names. Applied before bucketing.
        searchTerm:
          type: string
          description: Full-text search across log bodies. Applied before bucketing.
        filterGroup:
          type: array
          items:
            $ref: '#/components/schemas/_LogPropertyFilter'
          description: Property filters applied before bucketing. Same shape as `query-logs`.
    _LogsCountRangesRequest:
      type: object
      properties:
        query:
          allOf:
          - $ref: '#/components/schemas/_LogsCountRangesBody'
          description: The bucketed-count query to execute.
      required:
      - query
    _LogsCountRangesResponse:
      type: object
      properties:
        ranges:
          type: array
          items:
            $ref: '#/components/schemas/_LogsCountRangeBucket'
          description: Buckets ordered by `date_from` ascending. Empty buckets are
            omitted — infer gaps by comparing each bucket's `date_to` to the next
            bucket's `date_from`.
        interval:
          type: string
          description: Short-form duration of the chosen bucket width (e.g. "1h",
            "5m", "30s", "1d"). Informational only — use each bucket's `date_from`/`date_to`
            for follow-up queries.
      required:
      - interval
      - ranges
    _LogsCountRequest:
      type: object
      properties:
        query:
          allOf:
          - $ref: '#/components/schemas/_LogsCountBody'
          description: The count query to execute.
      required:
      - query
    _LogsCountResponse:
      type: object
      properties:
        count:
          type: integer
          description: Number of log entries matching the filters.
      required:
      - count
    _LogsQueryBody:
      type: object
      properties:
        dateRange:
          allOf:
          - $ref: '#/components/schemas/_DateRange'
          description: Date range for the query. Defaults to last hour.
        severityLevels:
          type: array
          items:
            $ref: '#/components/schemas/SeverityLevelsEnum'
          default: []
          description: Filter by log severity levels.
        serviceNames:
          type: array
          items:
            type: string
          default: []
          description: Filter by service names.
        orderBy:
          allOf:
          - $ref: '#/components/schemas/OrderByEnum'
          description: |-
            Order results by timestamp.

            * `latest` - latest
            * `earliest` - earliest
        searchTerm:
          type: string
          description: Full-text search term to filter log bodies.
        filterGroup:
          type: array
          items:
            $ref: '#/components/schemas/_LogPropertyFilter'
          default: []
          description: Property filters for the query.
        limit:
          type: integer
          default: 100
          description: Max results (1-1000).
        after:
          type: string
          description: Pagination cursor from previous response.
    _LogsQueryRequest:
      type: object
      properties:
        query:
          allOf:
          - $ref: '#/components/schemas/_LogsQueryBody'
          description: The logs query to execute.
      required:
      - query
    _LogsQueryResponse:
      type: object
      properties:
        query:
          type: object
          additionalProperties: {}
          description: The parsed query that was executed, echoed back for confirmation.
        results:
          type: array
          items:
            $ref: '#/components/schemas/_LogEntry'
          description: Log entries matching the query.
        hasMore:
          type: boolean
          description: True if more results exist beyond this page.
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor to pass as `after` in the next request to fetch
            the next page. Null when hasMore is false.
        maxExportableLogs:
          type: integer
          description: Maximum number of rows the `export` endpoint will produce —
            informational.
      required:
      - hasMore
      - maxExportableLogs
      - query
      - results
    _LogsServiceAggregate:
      type: object
      properties:
        service_name:
          type: string
          description: Service name, or "(no value)" / "(no service)" placeholder
            for unset entries.
        log_count:
          type: integer
          description: Total log entries from this service in the window.
        error_count:
          type: integer
          description: Count of logs at severity "error" or "fatal".
        error_rate:
          type: number
          format: double
          description: Pre-computed error_count / log_count, rounded to 4 decimals.
            Useful for ranking noisy services.
      required:
      - error_count
      - error_rate
      - log_count
      - service_name
    _LogsServicesBody:
      type: object
      properties:
        dateRange:
          allOf:
          - $ref: '#/components/schemas/_DateRange'
          description: Date range for the services aggregation. Defaults to last hour.
        severityLevels:
          type: array
          items:
            $ref: '#/components/schemas/SeverityLevelsEnum'
          description: Filter by log severity levels.
        serviceNames:
          type: array
          items:
            type: string
          description: Restrict the aggregation to these service names.
        searchTerm:
          type: string
          description: Full-text search term to filter log bodies.
        filterGroup:
          type: array
          items:
            $ref: '#/components/schemas/_LogPropertyFilter'
          description: Property filters for the query.
    _LogsServicesRequest:
      type: object
      properties:
        query:
          allOf:
          - $ref: '#/components/schemas/_LogsServicesBody'
          description: The services aggregation query to execute.
      required:
      - query
    _LogsServicesResponse:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/_LogsServiceAggregate'
          description: Per-service aggregates, ordered by log_count descending. Capped
            at 25 services.
        sparkline:
          type: array
          items:
            $ref: '#/components/schemas/_LogsServicesSparklineBucket'
          description: Time-bucketed counts broken down by service, for plotting volume
            over time.
      required:
      - services
      - sparkline
    _LogsServicesSparklineBucket:
      type: object
      properties:
        time:
          type: string
          description: Bucket start time (ISO 8601).
        service_name:
          type: string
        count:
          type: integer
      required:
      - count
      - service_name
      - time
    _LogsSparklineBody:
      type: object
      properties:
        dateRange:
          allOf:
          - $ref: '#/components/schemas/_DateRange'
          description: Date range for the sparkline. Defaults to last hour.
        severityLevels:
          type: array
          items:
            $ref: '#/components/schemas/SeverityLevelsEnum'
          default: []
          description: Filter by log severity levels.
        serviceNames:
          type: array
          items:
            type: string
          default: []
          description: Filter by service names.
        searchTerm:
          type: string
          description: Full-text search term to filter log bodies.
        filterGroup:
          type: array
          items:
            $ref: '#/components/schemas/_LogPropertyFilter'
          default: []
          description: Property filters for the query.
        sparklineBreakdownBy:
          allOf:
          - $ref: '#/components/schemas/SparklineBreakdownByEnum'
          description: |-
            Break down sparkline by "severity" (default) or "service".

            * `severity` - severity
            * `service` - service
    _LogsSparklineBucket:
      type: object
      properties:
        time:
          type: string
          description: Bucket start time (ISO 8601).
        severity:
          type: string
          description: Severity label when sparklineBreakdownBy="severity". Present
            only for severity-broken-down sparklines.
        service:
          type: string
          description: Service name when sparklineBreakdownBy="service". Present only
            for service-broken-down sparklines.
        count:
          type: integer
      required:
      - count
      - time
    _LogsSparklineRequest:
      type: object
      properties:
        query:
          allOf:
          - $ref: '#/components/schemas/_LogsSparklineBody'
          description: The sparkline query to execute.
      required:
      - query
    _LogsSparklineResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/_LogsSparklineBucket'
          description: Time-bucketed log counts. Each bucket carries either `severity`
            or `service` depending on breakdown.
      required:
      - results
    _LogsValuesResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/_LogAttributeValue'
          description: Distinct values observed for the requested attribute.
        refreshing:
          type: boolean
          description: Always false — reserved for future cached-value refresh signalling.
      required:
      - refreshing
      - results
    _SymbolSetDownloadResponse:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Presigned URL to download the source map file
      required:
      - url
    _User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
      required:
      - email
      - first_name
      - id
      - last_name
      - uuid
    _WelcomeInviter:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required:
      - email
      - name
    _WelcomePopularDashboard:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        team_id:
          type: integer
        url:
          type: string
      required:
      - description
      - id
      - name
      - team_id
      - url
    _WelcomeRecentActivity:
      type: object
      properties:
        type:
          type: string
          description: Scope.activity pair, e.g. 'Insight.created'.
        actor_name:
          type: string
        entity_name:
          type: string
        entity_url:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
      required:
      - actor_name
      - entity_name
      - entity_url
      - timestamp
      - type
    _WelcomeSuggestedStep:
      type: object
      properties:
        label:
          type: string
        href:
          type: string
        reason:
          type: string
        docs_href:
          type: string
        product_key:
          type: string
      required:
      - href
      - label
      - reason
    _WelcomeTeamMember:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        avatar:
          type: string
          nullable: true
        role:
          type: string
        last_active:
          $ref: '#/components/schemas/LastActiveEnum'
      required:
      - avatar
      - email
      - last_active
      - name
      - role
  securitySchemes:
    PersonalAPIKeyAuth:
      type: http
      scheme: bearer
