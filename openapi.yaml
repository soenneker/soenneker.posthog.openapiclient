        data_attributes:
          description: Element attributes that posthog-js should capture as action
            identifiers (e.g. `['data-attr']`).
        person_display_name_properties:
          type: array
          items:
            type: string
            maxLength: 400
          nullable: true
          description: Ordered list of person properties used to render a human-friendly
            display name in the UI.
        correlation_config:
          nullable: true
        autocapture_opt_out:
          type: boolean
          nullable: true
          description: Disables posthog-js autocapture (clicks, page views) when true.
        autocapture_exceptions_opt_in:
          type: boolean
          nullable: true
          description: Enables automatic capture of JavaScript exceptions via the
            SDK.
        autocapture_web_vitals_opt_in:
          type: boolean
          nullable: true
          description: Enables automatic capture of Core Web Vitals performance metrics.
        autocapture_web_vitals_allowed_metrics:
          nullable: true
        autocapture_exceptions_errors_to_ignore:
          nullable: true
        capture_console_log_opt_in:
          type: boolean
          nullable: true
          description: Enables capturing browser console logs alongside session replays.
        capture_performance_opt_in:
          type: boolean
          nullable: true
          description: Enables capturing performance timing and network requests.
        session_recording_opt_in:
          type: boolean
          description: Enables session replay recording for this project.
        session_recording_sample_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          nullable: true
          description: Fraction of sessions to record, as a decimal string between
            `0.00` and `1.00` (e.g. `0.1` = 10%).
        session_recording_minimum_duration_milliseconds:
          type: integer
          maximum: 30000
          minimum: 0
          nullable: true
          description: Skip saving sessions shorter than this many milliseconds.
        session_recording_linked_flag:
          nullable: true
        session_recording_network_payload_capture_config:
          nullable: true
        session_recording_masking_config:
          nullable: true
        session_recording_url_trigger_config:
          type: array
          items:
            nullable: true
          nullable: true
        session_recording_url_blocklist_config:
          type: array
          items:
            nullable: true
          nullable: true
        session_recording_event_trigger_config:
          type: array
          items:
            type: string
            nullable: true
          nullable: true
        session_recording_trigger_match_type_config:
          type: string
          nullable: true
          maxLength: 24
        session_recording_trigger_groups:
          nullable: true
          description: V2 trigger groups configuration for session recording. If present,
            takes precedence over legacy trigger fields.
        session_recording_retention_period:
          allOf:
          - $ref: '#/components/schemas/SessionRecordingRetentionPeriodEnum'
          description: |-
            How long to retain new session recordings. One of `30d`, `90d`, `1y`, or `5y` (availability depends on plan).

            * `30d` - 30 Days
            * `90d` - 90 Days
            * `1y` - 1 Year
            * `5y` - 5 Years
        session_replay_config:
          nullable: true
        survey_config:
          nullable: true
        access_control:
          type: boolean
        week_start_day:
          nullable: true
          description: |-
            First day of the week for date range filters. 0 = Sunday, 1 = Monday.

            * `0` - Sunday
            * `1` - Monday
          minimum: -32768
          maximum: 32767
          oneOf:
          - $ref: '#/components/schemas/WeekStartDayEnum'
          - $ref: '#/components/schemas/NullEnum'
        primary_dashboard:
          type: integer
          nullable: true
          description: ID of the dashboard shown as the project's default landing
            dashboard.
        live_events_columns:
          type: array
          items:
            type: string
          nullable: true
        recording_domains:
          type: array
          items:
            type: string
            nullable: true
            maxLength: 200
          nullable: true
          description: Origins permitted to record session replays and heatmaps. Empty
            list allows all origins.
        person_on_events_querying_enabled:
          type: boolean
          readOnly: true
        inject_web_apps:
          type: boolean
          nullable: true
        extra_settings:
          nullable: true
        modifiers:
          nullable: true
        default_modifiers:
          type: object
          additionalProperties: {}
          readOnly: true
        has_completed_onboarding_for:
          nullable: true
        surveys_opt_in:
          type: boolean
          nullable: true
          description: Enables displaying surveys via posthog-js on allowed origins.
        heatmaps_opt_in:
          type: boolean
          nullable: true
          description: Enables heatmap recording on pages that host posthog-js.
        product_intents:
          type: array
          items:
            type: object
            properties:
              product_type:
                type: string
              created_at:
                type: string
                format: date-time
              onboarding_completed_at:
                type: string
                format: date-time
                nullable: true
              updated_at:
                type: string
                format: date-time
          readOnly: true
        flags_persistence_default:
          type: boolean
          nullable: true
          description: Default value for the `persist` option on newly created feature
            flags.
        secret_api_token:
          type: string
          readOnly: true
          nullable: true
        secret_api_token_backup:
          type: string
          readOnly: true
          nullable: true
        receive_org_level_activity_logs:
          type: boolean
          nullable: true
        business_model:
          nullable: true
          description: |-
            Whether this project serves B2B or B2C customers. Used to optimize default UI layouts.

            * `b2b` - B2B
            * `b2c` - B2C
            * `other` - Other
          oneOf:
          - $ref: '#/components/schemas/BusinessModelEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        conversations_enabled:
          type: boolean
          nullable: true
          description: Enables the customer conversations / live chat product for
            this project.
        conversations_settings:
          nullable: true
        logs_settings:
          nullable: true
        proactive_tasks_enabled:
          type: boolean
          nullable: true
        available_setup_task_ids:
          type: array
          items:
            $ref: '#/components/schemas/AvailableSetupTaskIdsEnum'
