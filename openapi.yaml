  /api/projects/{project_id}/insights/{id}/:
    get:
      operationId: insights_retrieve
      description: |-
        DRF ViewSet mixin that gates coalesced responses behind permission checks.

        The QueryCoalescingMiddleware attaches cached response data to
        request.META["_coalesced_response"] for followers. This mixin runs DRF's
        initial() (auth + permissions + throttling) before returning the
        cached response, ensuring the request is authorized.
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: query
        name: from_dashboard
        schema:
          type: integer
        description: |2-

          Only if loading an insight in the context of a dashboard: The relevant dashboard's ID.
          When set, the specified dashboard's filters and date range override will be applied.
      - in: path
        name: id
        schema:
          oneOf:
          - type: integer
          - type: string
        description: Numeric primary key or 8-character `short_id` (for example `AaVQ8Ijw`)
          identifying the insight.
        required: true
      - in: path
        name: project_id
        required: true
        schema:
          type: string
        description: Project ID of the project you're trying to access. To find the
          ID of the project, make a call to /api/projects/.
      - in: query
        name: refresh
        schema:
          type: string
          enum:
          - async
          - async_except_on_cache_miss
          - blocking
          - force_async
          - force_blocking
          - force_cache
          - lazy_async
          default: force_cache
        description: |2-

          Whether to refresh the insight, how aggresively, and if sync or async:
          - `'force_cache'` - return cached data or a cache miss; always completes immediately as it never calculates
          - `'blocking'` - calculate synchronously (returning only when the query is done), UNLESS there are very fresh results in the cache
          - `'async'` - kick off background calculation (returning immediately with a query status), UNLESS there are very fresh results in the cache
          - `'lazy_async'` - kick off background calculation, UNLESS there are somewhat fresh results in the cache
          - `'force_blocking'` - calculate synchronously, even if fresh results are already cached
          - `'force_async'` - kick off background calculation, even if fresh results are already cached
          Background calculation can be tracked using the `query_status` response field.
      tags:
      - product_analytics
      - insights
      security:
      - PersonalAPIKeyAuth:
        - insight:read
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Insight'
            text/csv:
              schema:
                $ref: '#/components/schemas/Insight'
          description: ''
      x-explicit-tags:
      - product_analytics
