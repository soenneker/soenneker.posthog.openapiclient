    _LogEntry:
      type: object
      properties:
        uuid:
          type: string
        timestamp:
          type: string
          description: ISO 8601 timestamp of the original log event.
        observed_timestamp:
          type: string
          description: ISO 8601 timestamp the log pipeline observed the event (may
            differ from `timestamp`).
        body:
          type: string
        severity_text:
          type: string
          description: Log severity as a string (e.g. "info", "error"). Preferred
            over severity_number.
        severity_number:
          type: integer
          description: Log severity as a numeric code. Redundant with severity_text;
            kept for OpenTelemetry compatibility.
        level:
          type: string
          description: ClickHouse alias for severity_text. Redundant; prefer severity_text.
        trace_id:
          type: string
          description: Trace ID. Returns "00000000000000000000000000000000" when not
            set (padding, not null).
        span_id:
          type: string
          description: Span ID. Returns "0000000000000000" when not set (padding,
            not null).
        trace_flags:
          type: integer
          description: OpenTelemetry trace flags.
        attributes:
          type: object
          additionalProperties:
            type: string
          description: Log-level attributes as a string-keyed map. Values are strings
            (numeric/datetime attributes are also accessible via materialized columns).
        resource_attributes:
          type: object
          additionalProperties:
            type: string
          description: Resource-level attributes (service.name, k8s.*, host.hostname,
            etc.) as a string-keyed map. Repeats across all logs from the same pod/host.
        event_name:
          type: string
          description: OpenTelemetry event name, if set.
      required:
      - attributes
      - body
      - level
      - observed_timestamp
      - resource_attributes
      - severity_number
      - severity_text
      - span_id
      - timestamp
      - trace_id
      - uuid
    _LogPropertyFilter:
      type: object
      properties:
        key:
          type: string
          description: Attribute key. For type "log", use "message". For "log_attribute"/"log_resource_attribute",
            use the attribute key (e.g. "k8s.container.name").
        type:
          allOf:
          - $ref: '#/components/schemas/_LogPropertyFilterTypeEnum'
          description: |-
            "log" filters the log body/message. "log_attribute" filters log-level attributes. "log_resource_attribute" filters resource-level attributes.

            * `log` - log
            * `log_attribute` - log_attribute
            * `log_resource_attribute` - log_resource_attribute
        operator:
          allOf:
          - $ref: '#/components/schemas/_LogPropertyFilterOperatorEnum'
          description: |-
            Comparison operator.

            * `exact` - exact
            * `is_not` - is_not
            * `icontains` - icontains
            * `not_icontains` - not_icontains
            * `regex` - regex
            * `not_regex` - not_regex
            * `gt` - gt
            * `lt` - lt
            * `is_date_exact` - is_date_exact
            * `is_date_before` - is_date_before
            * `is_date_after` - is_date_after
            * `is_set` - is_set
            * `is_not_set` - is_not_set
        value:
          nullable: true
          description: Value to compare against. String, number, or array of strings.
            Omit for is_set/is_not_set operators.
      required:
      - key
      - operator
      - type
    _LogPropertyFilterOperatorEnum:
      enum:
      - exact
      - is_not
      - icontains
      - not_icontains
      - regex
      - not_regex
      - gt
      - lt
      - is_date_exact
      - is_date_before
      - is_date_after
      - is_set
      - is_not_set
      type: string
      description: |-
        * `exact` - exact
        * `is_not` - is_not
        * `icontains` - icontains
        * `not_icontains` - not_icontains
        * `regex` - regex
        * `not_regex` - not_regex
        * `gt` - gt
        * `lt` - lt
        * `is_date_exact` - is_date_exact
        * `is_date_before` - is_date_before
        * `is_date_after` - is_date_after
        * `is_set` - is_set
        * `is_not_set` - is_not_set
    _LogPropertyFilterTypeEnum:
      enum:
      - log
      - log_attribute
      - log_resource_attribute
      type: string
      description: |-
        * `log` - log
        * `log_attribute` - log_attribute
        * `log_resource_attribute` - log_resource_attribute
