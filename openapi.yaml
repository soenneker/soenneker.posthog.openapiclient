  /api/environments/{environment_id}/batch_exports/{batch_export_id}/runs/{id}/logs/:
    get:
      operationId: environments_batch_exports_runs_logs_retrieve
      parameters:
      - in: query
        name: after
        schema:
          type: string
          format: date-time
        description: Only return entries after this ISO 8601 timestamp.
      - in: path
        name: batch_export_id
        schema:
          type: string
          format: uuid
          description: The BatchExport this run belongs to.
        required: true
      - in: query
        name: before
        schema:
          type: string
          format: date-time
        description: Only return entries before this ISO 8601 timestamp.
      - in: path
        name: environment_id
        required: true
        schema:
          type: string
        description: Deprecated. Use /api/projects/{project_id}/ instead.
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this batch export run.
        required: true
      - in: query
        name: instance_id
        schema:
          type: string
          minLength: 1
        description: Filter logs to a specific execution instance.
      - in: query
        name: level
        schema:
          type: string
          minLength: 1
        description: 'Comma-separated log levels to include, e.g. ''WARN,ERROR''.
          Valid levels: DEBUG, LOG, INFO, WARN, ERROR.'
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
        description: Maximum number of log entries to return (1-500, default 50).
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
        description: Case-insensitive substring search across log messages.
      tags:
      - batch_exports
      - batch_exports
      responses:
        '200':
          description: No response body
      deprecated: true
      x-explicit-tags:
      - batch_exports
  /api/environments/{environment_id}/batch_exports/{batch_export_id}/runs/{id}/retry/:
